<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard — manage your lost items, found items, and claim requests.">
  <title>Dashboard — Lost & Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast-container"></div>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">☰</button>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">🔍</div>
        Lost &amp; Found
      </div>
    </div>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="userAvatar">?</div>
      <div class="sidebar-user-info">
        <h3 id="userName">—</h3>
        <p id="userEmail">—</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-link active" onclick="switchTab('lost', this)" id="navLost">
        <span class="nav-icon">📦</span> My Lost Items
      </button>
      <button class="nav-link" onclick="switchTab('found', this)" id="navFound">
        <span class="nav-icon">🎒</span> My Found Items
      </button>
      <button class="nav-link" onclick="switchTab('requests', this)" id="navRequests">
        <span class="nav-icon">📩</span> My Requests
      </button>
      <a href="lost-items.html" class="nav-link">
        <span class="nav-icon">📝</span> Report Lost
      </a>
      <a href="found-items.html" class="nav-link">
        <span class="nav-icon">📸</span> Browse Found
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logoutBtn">
        <span class="nav-icon">🚪</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Manage your items and requests</p>
    </div>

    <!-- Tabs -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" onclick="switchTab('lost', this)">Lost Items</button>
      <button class="tab-btn" onclick="switchTab('found', this)">Found Items</button>
      <button class="tab-btn" onclick="switchTab('requests', this)">Requests</button>
    </div>

    <div id="tabContent">
      <!-- Dynamic content rendered here -->
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
