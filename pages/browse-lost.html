<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse lost items reported by others and help them out.">
  <title>Browse Lost — Lost & Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="toast-container"></div>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- MODAL: I FOUND IT -->
<div class="modal-overlay" id="foundModal">
  <div class="modal-card">
    <h2>I Found This! 🎒</h2>
    <p class="subtitle mb-16">Send a message to the owner. They will receive your contact info.</p>
    <div class="form-group">
      <label for="foundMessage">Message</label>
      <textarea id="foundMessage" class="form-textarea" placeholder="I have your item. I left it at the reception..." rows="3" required></textarea>
    </div>
    <div class="card-actions mt-16">
      <button class="btn btn-primary" id="sendFoundBtn">Send Notification</button>
      <button class="btn btn-ghost" onclick="closeFoundModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">🔍</div>
        Lost &amp; Found
      </div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="userAvatar">?</div>
      <div class="sidebar-user-info">
        <h3 id="userName">—</h3>
        <p id="userEmail">—</p>
      </div>
      <a href="profile.html" class="btn btn-primary" style="display:block; text-align:center; box-sizing:border-box; width:100%; margin-top:8px; font-size:12px; padding:4px 8px; text-decoration:none;">Update Profile</a>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="lost-items.html" class="nav-link">
        <span class="nav-icon">📝</span> Report Lost
      </a>
      <a href="browse-lost.html" class="nav-link active">
        <span class="nav-icon">🔎</span> Browse Lost
      </a>
      <a href="found-items.html" class="nav-link">
        <span class="nav-icon">📸</span> Browse Found
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logoutBtn">
        <span class="nav-icon">🚪</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h1>Browse Lost Items</h1>
      <p>Help others find what they lost</p>
    </div>

    <!-- SEARCH & BROWSE -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-input" placeholder="Search by title…">
      </div>
      <div class="search-input-wrap">
        <span class="search-icon">📍</span>
        <input type="text" id="searchLocation" class="form-input" placeholder="Search by location…">
      </div>
      <select id="filterCategory" class="form-select">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Accessories">Accessories</option>
        <option value="Documents">Documents</option>
        <option value="Bags">Bags</option>
        <option value="Others">Others</option>
      </select>
    </div>

    <div id="lostItemsList" class="items-grid">
      <!-- Cards rendered by JS -->
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/browse-lost.js"></script>
</body>
</html>
